    <style>
      :root{
        /* Structural brand — charcoal/black, like machinery and steel */
        --brand-900: #121316;
        --brand-700: #232529;
        --brand-500: #2E3137;
        --brand-600: #1B1C1F;

        /* Signature accent — true safety yellow, used for primary actions */
        --accent-500: #F5C518;
        --accent-600: #D9AC0A;
        --accent-ink: #261D00;

        --ink: #15161A;
        --text-strong: #15161A;
        --text-muted: #5C5F63;
        --page-bg-top: #F5F5F4;
        --page-bg-bottom: #EBEBE9;
        --card-bg: #ffffff;
        --muted-border: #E2E2DF;

        /* Status semantics — muted, flat, enterprise-grade rather than candy-bright */
        --status-open-bg: #FCF0CE;
        --status-open-text: #7A5800;
        --status-closed-bg: #E1F1E6;
        --status-closed-text: #1F6B3C;
        --status-other-bg: #EBEAE5;
        --status-other-text: #54565A;

        --success-500: #1F6B3C;
        --success-600: #195A32;
        --danger-500: #B23A2E;

        --font-display: "Barlow Condensed", sans-serif;
        --font-body: "Inter", sans-serif;
        --font-mono: "IBM Plex Mono", monospace;
      }

      html,body{height:100%}
      body{
        margin:0;
        font-family: var(--font-body);
        background: linear-gradient(180deg, var(--page-bg-top) 0%, var(--page-bg-bottom) 100%);
        background-attachment: fixed;
        color:var(--text-strong);
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      h1,h2,h3,h4,h5,h6{ font-family: var(--font-display); letter-spacing: 0.01em; }

      .container-main{
        max-width:1250px;
        margin: 0 auto;
        padding: 16px;
      }

      /* =========================================
         DASHBOARD STYLES
         ========================================= */
      .dash-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-bottom: 22px;
      }

      .dash-card {
        position: relative;
        background: #fff;
        border-radius: 10px;
        padding: 18px 20px 16px;
        box-shadow: 0 1px 2px rgba(16,32,48,0.04);
        border: 1px solid var(--muted-border);
        border-top: 3px solid transparent;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .dash-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(16,32,48,0.08);
      }

      .dash-card.active-filter {
        box-shadow: 0 0 0 2px var(--brand-500), 0 6px 18px rgba(16,32,48,0.08);
      }

      /* COLORS — flat top accent bar, no gradient fills */
      .dash-card.card-blue { border-top-color: var(--brand-500); }
      .dash-card.card-blue .lbl { color: var(--text-muted); }
      .dash-card.card-blue .val { color: var(--ink); }
      .dash-card.card-blue .bg-icon { color: var(--brand-500); }

      .dash-card.card-red { border-top-color: var(--danger-500); }
      .dash-card.card-red .val { color: var(--danger-500); }
      .dash-card.card-red .bg-icon { color: var(--danger-500); }

      .dash-card.card-green { border-top-color: var(--success-500); }
      .dash-card.card-green .val { color: var(--success-500); }
      .dash-card.card-green .bg-icon { color: var(--success-500); }

      /* Typography */
      .dash-card .lbl {
        font-family: var(--font-body);
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        font-weight: 700;
        margin-bottom: 5px;
        position: relative; z-index: 2;
      }

      .dash-card .val {
        font-family: var(--font-mono);
        font-size: 32px;
        font-weight: 600;
        line-height: 1;
        position: relative; z-index: 2;
        font-variant-numeric: tabular-nums;
      }

      .dash-card .bg-icon {
        position: absolute;
        right: 12px;
        top: 12px;
        font-size: 20px;
        opacity: 0.55;
        z-index: 1;
        pointer-events: none;
      }

      /* Mobile Stack */
      @media (max-width: 768px) {
        .dash-grid { grid-template-columns: 1fr; gap: 12px; }
      }

      /* =========================================
         MAIN UI COMPONENTS
         ========================================= */

      .card-ui{
        background:var(--card-bg);
        border-radius:12px;
        border:1px solid var(--muted-border);
        box-shadow: 0 14px 50px rgba(9,30,66,0.08);
      }
      .card-inner{padding:16px;}

      .filter-box{
        margin-top:0px; padding:12px; border-radius:10px;
        background:#fff; border:1px solid var(--muted-border);
        display:flex; align-items:center; gap:12px; 
        position:sticky; top:10px; z-index:200;
        box-shadow: 0 1px 3px rgba(16,32,48,0.05);
      }
      .filter-bar{display:flex;gap:8px;align-items:center;width:100%;}
      .filter-bar>*{flex:1 1 0;min-width:110px;max-width:220px;}
      .filter-bar select,.filter-bar input{
        height:36px;padding:.325rem .65rem;border-radius:8px;border:1px solid #D7D5CC;
        background:#fff;font-size:13px; font-family: var(--font-body); color: var(--text-strong);
        transition: border-color .15s ease, box-shadow .15s ease;
      }
      .filter-bar select:focus,.filter-bar input:focus{
        outline:none; border-color: var(--brand-700); box-shadow: 0 0 0 3px rgba(245,197,24,0.28);
      }

      .chip{display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:7px;background:var(--status-other-bg);border:1px solid var(--muted-border);color:var(--brand-700);font-weight:600; font-size:12.5px;}

      .table-wrap{
        position:relative;border-radius:10px;overflow:auto;
        border:1px solid var(--muted-border);
        background:#fff;
        min-height:120px;max-height:calc(100vh - 350px);
      }
      
      table.table{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;word-break:break-word;}
      thead th {
        position: sticky; top: 0; z-index: 260;
        background: #F0EFEA !important; 
        color: var(--brand-700) !important; 
        padding: 11px 12px;
        border-bottom: 1px solid var(--muted-border);
        font-family: var(--font-body);
        font-weight: 700; font-size: 10.5px; text-align: left;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      
      tbody td{padding:10px 12px;border-bottom:1px solid #eee;vertical-align:middle;color:var(--text-strong);font-size:12px;}
      tbody tr:last-child td { border-bottom: none; }
      tbody tr:hover td{background:#F5F4EF;}
      .cell-mono{ font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

      #dataTable thead th:nth-child(1) { width: 50px; } 
      #dataTable thead th:nth-child(3) { width: 280px; } 
      #dataTable thead th:nth-child(9) { width: 80px; } 
      #dataTable tbody td:nth-child(1) { width: 50px; } 
      #dataTable tbody td:nth-child(3) { width: 280px; } 
      #dataTable tbody td:nth-child(9) { width: 80px; } 
      
      td.description{cursor:pointer;position:relative;height:66px;overflow:visible;}
      .desc-text{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;line-height:1.05rem;max-height:calc(1.05rem*3+6px);}

      /* STATUS BADGES */
      .status-badge { display: inline-flex; padding: 4px 11px; border-radius: 6px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.2px; white-space: nowrap; }
      .status-open-badge { background: var(--status-open-bg); color: var(--status-open-text); }
      .status-closed-badge { background: var(--status-closed-bg); color: var(--status-closed-text); }
      .status-other-badge { background: var(--status-other-bg); color: var(--status-other-text); }

      #loaderBar{
        position:absolute; top:0; left:0; height:4px; width:0%;
        background:linear-gradient(90deg,var(--brand-500),#4dabf7);
        border-radius:2px; transition:opacity .35s ease; z-index:600;
      }
      .data-region{ position:relative; }
      .table-wrap.loading #loaderBar, .data-region.loading #loaderBar{opacity:1; animation:progressBarAnim 1.8s infinite linear; }
      @keyframes progressBarAnim{ 0%{ left:0; width:0%; } 50%{ left:10%; width:75%; } 100%{ left:100%; width:0%; } }

      /* ==========================================================================
          APP-STYLE SIDE DRAWER
          ========================================================================== */
      
      .float-card-backdrop{
        position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:900;
        display:none; justify-content: flex-end; 
      }
      .float-card-backdrop.show{ display:flex; animation:fadeInBackdrop .25s ease; }
      @keyframes fadeInBackdrop{from{opacity:0}to{opacity:1}}

      .float-card{
        width: 500px; 
        max-width: 95vw; 
        height: 100%; 
        background: #ffffff; 
        color: #333;
        border-left: 1px solid #ccc;
        box-shadow: -10px 0 40px rgba(0,0,0,0.15);
        font-family: var(--font-body);
        font-size: 13px;
        display: flex; flex-direction: column; padding: 0;
        transform: translateX(100%);
        opacity: 1;
        animation: slideInRight 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        transition: box-shadow 0.3s ease, border-color 0.3s ease;
      }

      /* NEON EFFECTS */
      .float-card.neon-open {
        box-shadow: -4px 0 25px rgba(220, 53, 69, 0.4), inset 4px 0 10px rgba(220, 53, 69, 0.05);
        border-left: 3px solid #dc3545;
      }
      .float-card.neon-closed {
        box-shadow: -4px 0 25px rgba(25, 135, 84, 0.4), inset 4px 0 10px rgba(25, 135, 84, 0.05);
        border-left: 3px solid #198754;
      }

      @keyframes slideInRight {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      .float-card.hiding { animation: slideOutRight 0.3s ease forwards; }
      @keyframes slideOutRight {
        from { transform: translateX(0); }
        to { transform: translateX(100%); }
      }

      /* Header */
      .drawer-header {
        flex: 0 0 auto;
        padding: 24px 28px 10px 28px;
        border-bottom: 1px solid var(--muted-border);
        position: relative;
        background: #F5F4F0; 
      }

      /* Body */
      .drawer-content {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column; 
        overflow: hidden; 
        padding: 0;
      }
      
      .drawer-text-area {
        flex: 1;
        overflow-y: auto;
        padding: 24px 28px 10px 28px;
        scrollbar-width: thin;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .drawer-text-area::-webkit-scrollbar { width: 6px; }
      .drawer-text-area::-webkit-scrollbar-track { background: transparent; }
      .drawer-text-area::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 3px; }

      /* Footer */
      .drawer-footer {
        flex: 0 0 auto;
        padding: 16px 24px;
        background: #fff;
        border-top: 1px solid #e0e0e0;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 10;
      }
      .footer-group-left { display: flex; gap: 24px; }

      /* Drawer Controls */
      .float-close{
        position:absolute; right:20px; top:20px; z-index:60;
        border:1px solid #ddd; background:#fff;
        font-size:20px; cursor:pointer; color:#666;
        width: 36px; height: 36px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s;
      }
      .float-close:hover{ background:#f0f0f0; color:#000; transform: rotate(90deg); }

      .nav-controls {
        position: absolute; top: 20px; right: 110px; 
        display: flex; gap: 8px;
      }
      .nav-arrow{
        position: static; width: 36px; height: 36px;
        background: #fff; border:1px solid #ddd;
        color: #666; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 16px; transition: all 0.2s;
      }
      .nav-arrow:hover{ background: #f0f0f0; color:#000; }

      .btn-download-doc {
        position: absolute; top: 20px; right: 65px;
        width: 36px; height: 36px;
        border: 1px solid var(--brand-500); background: #fff;
        color: var(--brand-500); border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all 0.2s;
      }
      .btn-download-doc:hover { background: var(--brand-500); color: #fff; }

      .title-row{ flex-wrap: wrap; row-gap: 6px; padding-right: 185px; }
      .title-row h5{ display: inline-block; margin: 0; font-family: var(--font-display); color: var(--ink); font-size: 1.4rem; font-weight: 600; }
      .ref-box{
        position: static; display: inline-flex;
        margin-left: 12px;
        background: var(--status-other-bg); 
        border: 1px solid var(--muted-border);
        border-radius:7px; padding:4px 10px;
        align-items:center; gap:8px;
        color: var(--brand-700); font-weight:700;
        font-size:12px;
      }
      .ref-box .label{ font-size:10.5px; color: var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.6px; }
      .ref-box .value{ font-size:12px; color: var(--text-strong); }
      
      .meta{ color:var(--text-muted); font-size:13px; margin-top: 8px; padding-bottom: 4px; }
      .meta span { color: var(--text-strong); font-weight: 600; }

      /* Footer Items */
      .footer-item { display: flex; flex-direction: column; }
      .footer-label { font-size: 10px; text-transform: uppercase; color: #888; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 2px; }
      .footer-value { font-size: 14px; font-weight: 600; color: var(--text-strong); font-family: var(--font-mono); }
      
      .btn-mark-closed {
        padding: 10px 20px; font-size: 13px; border-radius: 8px;
        background: var(--success-500); color: #fff; border: none;
        cursor: pointer; font-weight: 600; transition: all 0.2s;
        white-space: nowrap;
      }
      .btn-mark-closed:hover { background: var(--success-600); }
      .btn-mark-closed:disabled { background: #e9ecef; color: #adb5bd; cursor: not-allowed; border: 1px solid #dee2e6; }

      /* DRAWER CONTENT LAYOUT */
      .desc-box {
        flex: 0 0 auto; min-height: 120px;
        background: #F8F7F2; border: 1px solid var(--muted-border);
        padding: 15px; border-radius: 12px;
      }
      .desc-box strong {
        color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
        display: block; margin-bottom: 8px;
      }
      .desc-content { font-size: 15px; line-height: 1.6; color: var(--ink); }

      .split-grid {
        display: grid; grid-template-columns: 200px 1fr; gap: 20px;
        flex: 1; min-height: 0;
      }
      .meta-left { display: flex; flex-direction: column; gap: 16px; }
      .meta-card { background: #fff; border: 1px solid var(--muted-border); padding: 12px; border-radius: 10px; }
      .meta-card strong{ display: block; color:var(--text-muted); font-weight:600; font-size:11px; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }

      .image-right {
        position: relative; border-radius: 12px; overflow: hidden;
        border: 1px solid var(--muted-border); background: #F8F7F2;
        min-height: 200px; display: flex; align-items: center; justify-content: center;
      }
      .image-container-large { width: 100%; height: 100%; border: none; background: transparent; }
      .image-container-large img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
      .no-image-text { color: #999; font-size: 13px; font-weight: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; height:100%; }

      .image-grid-multi{
        width:100%; height:100%; padding:8px;
        display:grid; grid-template-columns: repeat(2, 1fr); gap:8px;
        align-content:start; overflow-y:auto;
      }
      .image-grid-cell{ border-radius:8px; overflow:hidden; border:1px solid var(--muted-border); aspect-ratio: 1 / 1; }
      .image-grid-cell img{ width:100%; height:100%; object-fit:cover; cursor:zoom-in; display:block; }

      @media (max-width: 768px) {
        .split-grid { grid-template-columns: 1fr; }
        .drawer-footer { flex-direction: column; gap: 16px; align-items: stretch; }
        .footer-group-left { justify-content: space-between; }
        .btn-mark-closed { width: 100%; }
      }

      #lastUpdated{ text-align:right; color:var(--text-muted); font-size:12.5px; margin-top:8px; }
      #loader{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(250,252,255,0.95)); z-index:220; transition:opacity .22s ease; }
      #loader.hidden{ opacity:0; pointer-events:none; }

      /* ==========================================================================
          ADD NEW ACTION ITEM — floating button + drawer + toast
          ========================================================================== */
      .fab-add{
        position: fixed;
        right: 24px;
        bottom: calc(24px + env(safe-area-inset-bottom));
        width: 58px; height: 58px;
        border-radius: 50%;
        background: var(--accent-500);
        color: var(--ink);
        border: none;
        box-shadow: 0 8px 24px rgba(245,197,24,0.45);
        display: flex; align-items: center; justify-content: center;
        font-size: 24px;
        cursor: pointer;
        z-index: 500;
        transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      }
      .fab-add:hover{ background: var(--accent-600); transform: translateY(-2px) scale(1.04); box-shadow: 0 10px 28px rgba(245,197,24,0.55); }
      .fab-add:active{ transform: scale(0.96); }
      @media (max-width: 768px){
        .fab-add{ right: 18px; bottom: calc(18px + env(safe-area-inset-bottom)); width: 54px; height: 54px; font-size: 22px; }
      }

      .add-card .drawer-text-area{ gap: 16px; }
      .form-field{ display:flex; flex-direction:column; gap:6px; }
      .form-field label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
      .form-field .req{ color:var(--danger-500); margin-left:3px; }
      .form-field input[type="text"],
      .form-field input[type="date"],
      .form-field select,
      .form-field textarea{
        border:1px solid #D7D5CC; border-radius:8px; padding:9px 12px;
        font-size:14px; font-family: var(--font-body); color:var(--text-strong);
        background:#fff;
      }
      .form-field textarea{ resize:vertical; min-height:80px; }
      .form-field input:focus, .form-field select:focus, .form-field textarea:focus{
        outline:none; border-color: var(--brand-700); box-shadow: 0 0 0 3px rgba(245,197,24,0.28);
      }
      .form-grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
      @media (max-width:480px){
        .form-grid-2{ grid-template-columns:1fr; }
        .form-grid-2.form-grid-dates{ grid-template-columns:1fr 1fr; gap:8px; }
        .form-grid-dates input[type="date"]{ padding:9px 6px; font-size:13px; }
        .form-grid-dates label{ font-size:10px; }
      }

      .image-upload-box{
        border:1.5px dashed #D7D5CC; border-radius:10px; padding:14px;
        display:flex; align-items:center; gap:12px; cursor:pointer; background:#F8F7F2;
        transition: border-color .15s ease, background .15s ease;
      }
      .image-upload-box:hover{ border-color:var(--brand-500); background:#F5F3EC; }
      .image-upload-box .upload-icon{ font-size:22px; color:var(--brand-500); flex:0 0 auto; }
      .image-upload-box .upload-text{ font-size:13px; color:var(--text-muted); }

      .image-thumb-strip{
        display:flex; flex-wrap:wrap; gap:10px; margin-top:12px;
      }
      .image-thumb-strip:empty{ margin-top:0; }
      .image-thumb-chip{
        position:relative; width:68px; height:68px; border-radius:9px; overflow:hidden;
        border:1px solid var(--muted-border); flex:0 0 auto;
      }
      .image-thumb-chip img{ width:100%; height:100%; object-fit:cover; display:block; }
      .image-thumb-remove{
        position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%;
        background:rgba(21,22,26,0.72); color:#fff; border:none; font-size:13px; line-height:1;
        display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;
      }
      .image-thumb-remove:hover{ background:var(--danger-500); }

      .btn-save-addition{
        padding:10px 22px; font-size:13px; border-radius:8px;
        background: var(--accent-500); color:var(--accent-ink); border:none;
        cursor:pointer; font-weight:700; transition:all .2s; width:100%;
        display:flex; align-items:center; justify-content:center; gap:8px;
        font-family: var(--font-body);
      }
      .btn-save-addition:hover{ background: var(--accent-600); }
      .btn-save-addition:disabled{ background:#DCDAD2; color:#8A8A85; cursor:not-allowed; }

      .app-toast{
        position: fixed; left:50%; bottom: calc(24px + env(safe-area-inset-bottom));
        transform: translateX(-50%) translateY(20px);
        background:var(--ink); color:#fff; padding:12px 20px; border-radius:10px;
        font-size:13.5px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.25);
        display:flex; align-items:center; gap:10px;
        z-index:1000; opacity:0; pointer-events:none;
        transition: opacity .25s ease, transform .25s ease;
        max-width: 90vw;
      }
      .app-toast.show{ opacity:1; transform: translateX(-50%) translateY(0); pointer-events:auto; }
      .app-toast.toast-error{ background:#7A2A22; }
      .app-toast i{ font-size:16px; }

      /* ==========================================================================
          APP BAR (sticky branded header — replaces the plain toolbar row)
          ========================================================================== */
      .app-bar{
        position: sticky; top: 0; z-index: 300;
        background: linear-gradient(120deg, var(--brand-900) 0%, var(--brand-500) 100%);
        padding-top: env(safe-area-inset-top);
        box-shadow: 0 4px 18px rgba(10,9,6,0.28);
      }
      .app-bar::after{
        content: "";
        display: block;
        height: 5px;
        background: repeating-linear-gradient(135deg, var(--accent-500) 0 10px, var(--brand-900) 10px 20px);
      }
      .app-bar-inner{
        max-width: 1250px; margin: 0 auto;
        padding: 13px 18px;
        display: flex; align-items: center; justify-content: space-between;
      }
      .app-bar-title{
        display: flex; align-items: center; gap: 11px;
        color: #fff; font-family: var(--font-display); font-weight: 700;
        font-size: 19px; letter-spacing: 0.4px; text-transform: uppercase;
      }
      .app-bar-title i{ font-size: 19px; color: var(--accent-500); }
      .app-bar-actions{ display: flex; gap: 8px; }
      .icon-btn{
        width: 36px; height: 36px; border-radius: 9px;
        background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.16); color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-size: 15px; cursor: pointer; transition: background .15s ease;
      }
      .icon-btn:hover{ background: rgba(255,255,255,0.22); }
      .icon-btn:active{ transform: scale(0.94); }

      /* ==========================================================================
          MOBILE FILTER TRIGGER + BOTTOM SHEET
          (desktop keeps the original inline filter-bar; only the @media block
           below repositions .filter-box into a bottom sheet)
          ========================================================================== */
      .mobile-filter-trigger{ display: none; gap: 10px; margin-bottom: 12px; }
      .mobile-filter-trigger input{
        flex: 1; height: 42px; border-radius: 10px; border: 1px solid #D7D5CC;
        padding: 0 14px; font-size: 14px; font-family: var(--font-body); color: var(--text-strong); background:#fff;
        transition: border-color .15s ease, box-shadow .15s ease;
      }
      .mobile-filter-trigger input:focus{
        outline:none; border-color: var(--brand-700); box-shadow: 0 0 0 3px rgba(245,197,24,0.28);
      }
      .filter-trigger-btn{
        position: relative; width: 42px; height: 42px; border-radius: 10px;
        background: var(--brand-500); color: #fff; border: none; font-size: 17px;
        display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
      }
      .filter-count-badge{
        position: absolute; top: -6px; right: -6px;
        background: var(--danger-500); color: #fff; font-size: 10px; font-weight: 700;
        min-width: 18px; height: 18px; border-radius: 999px;
        display: flex; align-items: center; justify-content: center; padding: 0 4px;
        border: 2px solid #fff;
      }
      .sheet-handle{ display:none; }
      .sheet-header{ display:none; }
      .sheet-footer{ display:none; }

      /* ==========================================================================
          MOBILE CARD LIST (replaces the data table on narrow screens)
          ========================================================================== */
      .card-list-wrap{ display:none; padding: 4px 2px 4px; }
      .item-card{
        position: relative;
        background:#fff; border:1px solid var(--muted-border); border-radius:12px;
        border-left: 4px solid var(--muted-border);
        padding:14px 16px; margin-bottom:10px;
        box-shadow: 0 1px 3px rgba(16,32,48,0.04);
        cursor:pointer; transition: transform .12s ease, box-shadow .12s ease;
      }
      .item-card.accent-open{ border-left-color: var(--accent-500); }
      .item-card.accent-closed{ border-left-color: var(--success-500); }
      .item-card.accent-other{ border-left-color: #A8A6A0; }
      .item-card:active{ transform: scale(0.985); box-shadow: 0 1px 4px rgba(9,30,66,0.08); }
      .item-card-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
      .item-dept{ font-family: var(--font-display); font-weight:600; font-size:13.5px; color:var(--ink); }
      .item-desc{
        font-size:13px; color:#3c4a5e; line-height:1.45; margin-bottom:11px;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
      }
      .item-card-meta{ display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-bottom:10px; }
      .item-ref-tag{
        background: var(--status-other-bg); color: var(--brand-700);
        font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
        padding: 3px 9px; border-radius: 5px;
      }
      .item-date{
        display:inline-flex; align-items:center; gap:5px;
        font-family: var(--font-mono); font-size: 11.5px; color:var(--text-muted); font-weight: 500;
      }
      .item-date i{ font-size:12px; color: var(--text-muted); }
      .photo-count{
        display:inline-flex; align-items:center; gap:4px;
        font-size:11px; font-weight:600; color: var(--brand-700);
        background: var(--status-other-bg); padding:2px 7px; border-radius:5px;
      }
      .photo-count i{ font-size:11px; }
      .item-card-foot{ display:flex; align-items:center; justify-content:space-between; padding-top:9px; border-top:1px solid #F0EFE9; }
      .item-card-foot .person{ display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:var(--text-strong); }
      .item-card-foot .person i{ color:var(--brand-500); }
      .item-card-foot .bi-chevron-right{ color:#A8A6A0; font-size:14px; }
      .card-list-empty{ text-align:center; color:var(--text-muted); font-size:13.5px; padding:40px 0; }

      /* ==========================================================================
          MOBILE BREAKPOINT — the actual "looks like an app, not a webpage" layer
          ========================================================================== */
      @media (max-width: 768px){
        .container-main{ padding: 10px 10px calc(90px + env(safe-area-inset-bottom)) 10px; }

        /* Compact 3-up stat tiles instead of full-height stacked cards */
        .dash-grid{ grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
        .dash-card{ padding: 12px 10px; border-radius: 10px; }
        .dash-card .lbl{ font-size: 8.5px; margin-bottom: 4px; }
        .dash-card .val{ font-size: 22px; }
        .dash-card .bg-icon{ display:none; }

        /* Swap inline filter row for the compact search + filter-sheet trigger */
        .mobile-filter-trigger{ display:flex; }

        .filter-box{
          position: fixed; top:auto; left:0; right:0; bottom:0; z-index:920;
          background:#fff; border-radius:18px 18px 0 0; border:none;
          box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
          max-height: 82vh; overflow-y:auto;
          padding: 8px 18px calc(18px + env(safe-area-inset-bottom)) 18px;
          transform: translateY(110%); transition: transform .32s cubic-bezier(0.22,1,0.36,1);
          display: block;
        }
        .filter-box.sheet-open{ transform: translateY(0); }
        .sheet-handle{
          display:block; width:40px; height:4px; border-radius:999px;
          background:#ddd9cd; margin: 6px auto 10px auto;
        }
        .sheet-header{
          display:flex; align-items:center; justify-content:space-between;
          font-family: var(--font-display); font-weight:600; font-size:15.5px; color:var(--ink); margin-bottom:10px;
        }
        .sheet-header .float-close{ position:static; width:30px; height:30px; }
        .filter-bar{ flex-direction:column; align-items:stretch; gap:10px; }
        .filter-bar>*{ width:100%; max-width:100%; min-width:0; }
        #activeChips{ flex-wrap:wrap; margin-top:8px; }
        .sheet-footer{ display:block; margin-top:14px; }

        /* Table → cards */
        .table-wrap{ display:none; }
        .card-list-wrap{ display:block; }

        #lastUpdated{ padding-bottom: 6px; }
      }
    </style>
  </head>
  <body>

    <header class="app-bar">
      <div class="app-bar-inner">
        <div class="app-bar-title">
          <i class="bi bi-clipboard2-check-fill"></i>
          <span>Action Item Tracking Register</span>
        </div>
        <div class="app-bar-actions">
          <button id="btnRefreshTop" class="icon-btn" title="Refresh Data"><i class="bi bi-arrow-clockwise"></i></button>
          <button id="btnPrintTop" class="icon-btn" title="Print Table"><i class="bi bi-printer"></i></button>
        </div>
      </div>
    </header>

    <main class="container-main">

      <div class="dash-grid">
        
        <div class="dash-card card-blue" id="cardTotal" onclick="applyStatusFilter('All')">
          <div class="lbl">Total Actions</div>
          <div class="val" id="statTotal">0</div>
          <i class="bi bi-folder2-open bg-icon"></i>
        </div>

        <div class="dash-card card-red" id="cardOpen" onclick="applyStatusFilter('Open')">
          <div class="lbl">Open Actions</div>
          <div class="val" id="statOpen">0</div>
          <i class="bi bi-exclamation-triangle bg-icon"></i>
        </div>

        <div class="dash-card card-green" id="cardClosed" onclick="applyStatusFilter('Closed')">
          <div class="lbl">Closed Actions</div>
          <div class="val" id="statClosed">0</div>
          <i class="bi bi-check-circle bg-icon"></i>
        </div>

      </div>

      <div class="card-ui">
        <div class="card-inner">
          
          <div class="mobile-filter-trigger">
            <input id="filterTextMobile" class="form-control form-control-sm" placeholder="Search description or reference..." />
            <button id="btnOpenFilterSheet" class="filter-trigger-btn" title="Filters">
              <i class="bi bi-sliders"></i>
              <span id="filterCountBadge" class="filter-count-badge" style="display:none">0</span>
            </button>
          </div>

          <div class="filter-box" id="filterBox">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
              <span>Filters</span>
              <button class="float-close" id="filterSheetClose" aria-label="Close">&times;</button>
            </div>
            <div class="filter-bar">
              <select id="filterDept" class="form-select form-select-sm"><option value="">All Departments</option></select>
              <select id="filterResp" class="form-select form-select-sm"><option value="">All Responsible Persons</option></select>
              <select id="filterRef" class="form-select form-select-sm"><option value="">All References</option></select>
              <select id="filterMonth" class="form-select form-select-sm"><option value="">All Months</option></select>
              <select id="filterYear" class="form-select form-select-sm"><option value="">All Years</option></select>
              <input id="filterText" class="form-control form-control-sm" placeholder="Search text..." />
              
              <button id="btnClearFilters" class="btn btn-outline-secondary btn-sm" style="flex:0 0 auto; font-family: var(--font-body); font-weight:600;">Clear</button>
            </div>
            <div class="d-flex align-items-center ms-3" id="activeChips"></div>
            <div class="sheet-footer">
              <button id="btnApplyFilterSheet" class="btn-save-addition">Show Results</button>
            </div>
          </div>
          <div class="float-card-backdrop" id="filterSheetBackdrop" aria-hidden="true"></div>

          <div class="data-region" id="dataRegion">
            <div id="loaderBar" aria-hidden="true"></div>
            <div id="loader" aria-hidden="false">
              <div style="display:flex;flex-direction:column;align-items:center;">
                <div style="display:flex;align-items:center;">
                  <span style="width:10px;height:10px;border-radius:999px;background:var(--brand-500);display:inline-block;margin:0 6px;opacity:.6"></span>
                  <span style="width:10px;height:10px;border-radius:999px;background:var(--brand-500);display:inline-block;margin:0 6px;opacity:.6"></span>
                  <span style="width:10px;height:10px;border-radius:999px;background:var(--brand-500);display:inline-block;margin:0 6px;opacity:.6"></span>
                </div>
                <div style="margin-top:10px;font-size:13px;color:var(--text-muted)">Loading data…</div>
              </div>
            </div>

            <div class="table-wrap mt-2" id="tableWrap" role="region" aria-live="polite">
              <table class="table align-middle table-hover" id="dataTable" aria-describedby="tableWrap">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Department</th>
                    <th>Description</th>
                    <th>Reference</th>
                    <th>Initiation Date</th>
                    <th>Target Date</th>
                    <th>Action By</th>
                    <th>Responsible Person</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>

            <div class="card-list-wrap" id="cardListWrap" role="region" aria-live="polite"></div>
          </div>


          <div id="lastUpdated"></div>
        </div>
      </div>
    </main>

    <div class="float-card-backdrop" id="floatBackdrop" aria-hidden="true">
      <div class="float-card" role="dialog" aria-modal="true" aria-hidden="true" id="floatCard">
        
        <div class="drawer-header">
          <div class="nav-controls">
            <div class="nav-arrow" id="navPrev" title="Previous"><i class="bi bi-chevron-left"></i></div>
            <div class="nav-arrow" id="navNext" title="Next"><i class="bi bi-chevron-right"></i></div>
          </div>
          <div class="btn-download-doc" id="btnDownloadDoc" title="Download Word Doc"><i class="bi bi-file-word"></i></div>
          <button class="float-close" id="floatClose" aria-label="Close">&times;</button>

          <div class="title-row" style="display:flex; align-items:center;">
            <h5 id="floatTitle">#</h5>
            <div class="ref-box" id="refBox"><div class="label">Reference</div><div class="value" id="refValue"></div></div>
          </div>
          <div class="meta" id="floatMeta"></div>
        </div>

        <div class="drawer-content" id="floatBodyContainer">
          <div class="drawer-text-area" id="floatBody"></div>
        </div>

        <div class="drawer-footer" id="floatFooter"></div>

      </div>
    </div>

    <div class="float-card-backdrop" id="lightboxBackdrop" style="z-index: 950; display: none; align-items: center; justify-content: center;">
      <div id="lightboxContent" style="position: relative; max-width: 96vw; max-height: 96vh; display: flex; align-items: center; justify-content: center; border-radius: 12px;">

    <div class="app-toast" id="appToast"><i class="bi bi-check-circle-fill"></i><span id="appToastText"></span></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // ⚠️ UPDATE THIS URL
      const SCRIPT_BASE_URL = "https://script.google.com/macros/s/AKfycbxlY4kYrWOKpOaGLzxNAmmC46LZzzJPLBj-tHf9NS_xMZwlcPXPRPMPbdG5dNqx8zxHjQ/exec";

      // DOM refs
      const tableBody = document.getElementById('tableBody');
      const statTotalEl = document.getElementById('statTotal');
      const statOpenEl = document.getElementById('statOpen');
      const statClosedEl = document.getElementById('statClosed');
      
      const cardTotal = document.getElementById('cardTotal');
      const cardOpen = document.getElementById('cardOpen');
      const cardClosed = document.getElementById('cardClosed');

      const btnRefreshTop = document.getElementById('btnRefreshTop');
      const btnPrintTop = document.getElementById('btnPrintTop');
      const loader = document.getElementById('loader');
      const tableWrap = document.getElementById('tableWrap');
      const dataRegion = document.getElementById('dataRegion');
      const cardListWrap = document.getElementById('cardListWrap');
      const lastUpdatedEl = document.getElementById('lastUpdated');
      const filterDept = document.getElementById('filterDept');
      const filterResp = document.getElementById('filterResp');
      const filterRef = document.getElementById('filterRef');
      const filterMonth = document.getElementById('filterMonth');
      const filterYear = document.getElementById('filterYear');
      const filterText = document.getElementById('filterText');
      const filterTextMobile = document.getElementById('filterTextMobile');
      const btnClear = document.getElementById('btnClearFilters');
      const activeChips = document.getElementById('activeChips');
      const loaderBar = document.getElementById('loaderBar');

      // mobile filter-sheet refs
      const filterBox = document.getElementById('filterBox');
      const btnOpenFilterSheet = document.getElementById('btnOpenFilterSheet');
      const filterSheetClose = document.getElementById('filterSheetClose');
      const filterSheetBackdrop = document.getElementById('filterSheetBackdrop');
      const btnApplyFilterSheet = document.getElementById('btnApplyFilterSheet');
      const filterCountBadge = document.getElementById('filterCountBadge');

      // popup refs
      const floatBackdrop = document.getElementById('floatBackdrop');
      const floatCard = document.getElementById('floatCard');
      const floatClose = document.getElementById('floatClose');
      const floatTitle = document.getElementById('floatTitle');
      const floatMeta = document.getElementById('floatMeta');
      const floatBody = document.getElementById('floatBody');
      const floatFooter = document.getElementById('floatFooter');
      const refValue = document.getElementById('refValue');
      const navPrev = document.getElementById('navPrev');
      const navNext = document.getElementById('navNext');
      const btnDownloadDoc = document.getElementById('btnDownloadDoc');
      
      // Lightbox DOM refs
      const lightboxBackdrop = document.getElementById('lightboxBackdrop');
      const lightboxImage = document.getElementById('lightboxImage');
      const lightboxClose = document.getElementById('lightboxClose');

      let allData = [];
      let filteredData = [];
      let currentIndex = -1;
      let activeStatusFilter = 'All'; // 'All', 'Open', 'Closed'

      function animateCount(el, newVal, duration = 600){
        const start = Number(el.textContent) || 0;
        const end = Number(newVal) || 0;
        if (start === end) { el.textContent = end; return; }
        const startTs = performance.now();
        function tick(ts){ const progress = Math.min(1,(ts-startTs)/duration); const value = Math.round(start + (end-start)*progress); el.textContent = value; if(progress<1) requestAnimationFrame(tick); else el.textContent = end; }
        requestAnimationFrame(tick);
      }

      function cleanDate(dateString){
        if (!dateString) return "";
        let dateObj;
        if (typeof dateString === 'string') {
            if (dateString.includes('/')) {
                const parts = dateString.split('/');
                if (parts.length === 3) {
                    const monthPart = parts[1] || '1'; 
                    dateObj = new Date(`${monthPart}/${parts[0]}/${parts[2]}`);
                }
            }
            if (!dateObj || isNaN(dateObj.getTime())) { dateObj = new Date(dateString); }
        } else if (typeof dateString === 'number' && dateString > 1000000000000) {
            dateObj = new Date(dateString);
        } else if (typeof dateString === 'number' && dateString < 100000 && dateString > 25569) {
            const excelEpoch = new Date(Date.UTC(1899, 11, 30));
            dateObj = new Date(excelEpoch.getTime() + (dateString * 24 * 60 * 60 * 1000));
        } else {
            dateObj = new Date(String(dateString));
        }
        if (isNaN(dateObj.getTime())) { return String(dateString).substring(0, 10).replace('T', ''); }
        const year = dateObj.getFullYear();
        const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; 
        const month = monthNames[dateObj.getMonth()];
        const day = ('0' + dateObj.getDate()).slice(-2);
        return `${day}-${month}-${year}`; 
      }

      function dateHelper(dateString){
        if (!dateString) return '';
        const cleaned = cleanDate(dateString);
        const parts = cleaned.split('-');
        if (parts.length === 3) {
          const [day, monthName, year] = parts;
          const monthMap = { Jan: '01', Feb: '02', Mar: '03', Apr: '04', May: '05', Jun: '06', Jul: '07', Aug: '08', Sep: '09', Oct: '10', Nov: '11', Dec: '12' };
          const month = monthMap[monthName];
          if (month && year.length === 4) return `${year}-${month}-${day}`;
        }
        if (typeof dateString === 'string' && dateString.length >= 10 && (dateString.includes('-') || dateString.includes('/'))) {
            return dateString.substring(0, 10).replace(/\//g, '-');
        }
        return '';
      }

      function getStatusBadgeHtml(statusRaw) {
          const statusLower = statusRaw.toLowerCase();
          let badgeClass = 'status-other-badge';
          if(statusLower==='closed'){ badgeClass='status-closed-badge'; }
          else if(statusLower==='open') { badgeClass='status-open-badge'; }
          return `<div class="status-badge ${badgeClass}">${statusRaw}</div>`;
      }

      function updateTableRowStatusInDOM(rowId, newStatus) {
          const selector = `tr[data-row="${rowId}"]`;
          const rowsToUpdate = document.querySelectorAll(selector);
          const statusHtml = getStatusBadgeHtml(newStatus);
          rowsToUpdate.forEach(row => {
              const statusCell = row.querySelector('.status-col'); 
              if (statusCell) {
                  statusCell.innerHTML = statusHtml;
                  const json = row.getAttribute('data-json');
                  if (json) {
                      const obj = JSON.parse(decodeURIComponent(json));
                      obj.Status = newStatus;
                      row.setAttribute('data-json', encodeURIComponent(JSON.stringify(obj)));
                  }
              }
          });
      }

      function showProgressBar(){
        if(!dataRegion) return;
        dataRegion.classList.add('loading');
        loaderBar.style.opacity = '1';
        loaderBar.style.width = '0%';
      }
      function hideProgressBar(){
        if(!dataRegion) return;
        loaderBar.style.width = '100%';
        setTimeout(()=>{
          dataRegion.classList.remove('loading');
          loaderBar.style.opacity = '0';
          loaderBar.style.width = '0%';
        }, 420);
      }

      function showLoader(){ if(loader){ loader.style.display='flex'; loader.classList.remove('hidden'); } }
      function hideLoader(){ if(loader){ loader.classList.add('hidden'); setTimeout(()=> loader.style.display='none',360); } }

      // Updated Layout for NO HEADER
      function updateLayoutOffsets(){
        const filter = document.getElementById('filterBox');
        const isDesktop = window.matchMedia('(min-width: 769px)').matches;
        if (isDesktop) {
          const offset = 10; // Simple small offset
          if (filter) filter.style.top = offset + 'px';
        } else if (filter) {
          filter.style.top = ''; // mobile uses the fixed bottom-sheet position from CSS, not top
        }
        const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
        // Space needed = Dashboard + Toolbar + Filter + Padding
        const used = 290; 
        const max = Math.max(300, vh - used);
        if (tableWrap) tableWrap.style.maxHeight = max + 'px';
      }

      function sortData(data){
        data.sort((a,b)=>{
          const dateA = dateHelper(a["Initiation Date"]);
          const dateB = dateHelper(b["Initiation Date"]);
          const tsA = new Date(dateA).getTime();
          const tsB = new Date(dateB).getTime();
          if (isNaN(tsA) && isNaN(tsB)) return 0;
          if (isNaN(tsA)) return 1; 
          if (isNaN(tsB)) return -1; 
          if(tsA > tsB) return -1; 
          if(tsA < tsB) return 1;
          return 0;
        });
      }

      async function fetchData(){
        updateLayoutOffsets();
        if (!SCRIPT_BASE_URL){ tableBody.innerHTML = `<tr><td colspan="9" class="text-danger text-center">SCRIPT_BASE_URL not set.</td></tr>`; hideLoader(); hideProgressBar(); return; }
        showLoader();
        showProgressBar();
        tableBody.innerHTML = `<tr><td colspan="9" class="text-center text-primary">Loading data...</td></tr>`;
        try{
          const res = await fetch(SCRIPT_BASE_URL + '?t=' + Date.now(), { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const json = await res.json();
          
          if (Array.isArray(json)) allData = json;
          else if (json && Array.isArray(json.data)) allData = json.data;
          else if (json && Array.isArray(json.records)) allData = json.records;
          else { let arr=[]; if (json && typeof json === 'object'){ for(const k of Object.keys(json)){ if(Array.isArray(json[k])){ arr = json[k]; break; } } } allData = arr || []; }

          sortData(allData);

          let serverTimeValue = null;
          if (json && typeof json === 'object') serverTimeValue = json.serverTime || json.server_time || json.lastUpdated || json.last_updated || json.timestamp || json.time || json.now;
          if (serverTimeValue){
            let parsed=null; try{ parsed = new Date(serverTimeValue); }catch(e){ parsed=null; }
            if(!parsed || isNaN(parsed)){ const num = Number(serverTimeValue); if(!isNaN(num)) parsed = new Date(num); }
            if(parsed && !isNaN(parsed)) lastUpdatedEl.textContent = "Last updated on " + parsed.toLocaleString('en-GB', { timeZone:'Asia/Kolkata', year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) + " (server)";
          }
          if(!lastUpdatedEl.textContent){ const now=new Date(); lastUpdatedEl.textContent = "Last updated on " + now.toLocaleString('en-GB', { timeZone:'Asia/Kolkata', year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) + " (client)"; }

          populateFilters();
          renderTable();
        }catch(err){
          console.error('Fetch error', err);
          tableBody.innerHTML = `<tr><td colspan="9" class="text-danger text-center">Failed to load data. Check Apps Script & permissions.</td></tr>`;
          animateCount(statTotalEl,0); animateCount(statOpenEl,0); animateCount(statClosedEl,0);
        }finally{
          const tbl = document.getElementById('dataTable'); if(tbl){ tbl.classList.add('table-fade'); setTimeout(()=> tbl.classList.add('show'),40); }
          hideLoader();
          hideProgressBar();
        }
      }

      function populateFilters(){
        const currentDept = filterDept.value; const currentResp = filterResp.value; const currentRef = filterRef.value;
        const depts = [...new Set(allData.map(d => d.Department).filter(Boolean))].sort();
        const resps = [...new Set(allData.map(d => d["Responsible Person"]).filter(Boolean))].sort();
        const refs = [...new Set(allData.map(d => d.Reference).filter(Boolean))].sort();
        const actionBys = [...new Set(allData.map(d => d["Action By"]).filter(Boolean))].sort();

        // Feed the same known values into the "Add New Action Item" form as suggestions
        const fillDatalist = (id, values) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = values.map(v => `<option value="${String(v).replace(/"/g,'&quot;')}"></option>`).join('');
        };
        fillDatalist('deptOptions', depts);
        fillDatalist('respOptions', resps);
        fillDatalist('refOptions', refs);
        fillDatalist('actionByOptions', actionBys);

        const allDates = allData.map(d => dateHelper(d["Initiation Date"])).filter(Boolean);
        const months = [...new Set(allDates.map(d => d.substring(5,7)))].sort();
        const years = [...new Set(allDates.map(d => d.substring(0,4)))].sort((a,b)=>b-a);
        const monthNames=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const getMonthName = (m) => monthNames[parseInt(m,10)] || m;

        filterMonth.innerHTML = '<option value="">All Months</option>' + months.map(m => `<option value="${m}" ${m===filterMonth.value? 'selected':''}>${getMonthName(m)}</option>`).join('');
        filterYear.innerHTML = '<option value="">All Years</option>' + years.map(y => `<option value="${y}" ${y===filterYear.value? 'selected':''}>${y}</option>`).join('');
        filterDept.innerHTML = '<option value="">All Departments</option>' + depts.map(v => `<option value="${v}" ${v===currentDept? 'selected':''}>${v}</option>`).join('');
        filterResp.innerHTML = '<option value="">All Responsible Persons</option>' + resps.map(v => `<option value="${v}" ${v===currentResp? 'selected':''}>${v}</option>`).join('');
        filterRef.innerHTML = '<option value="">All References</option>' + refs.map(v => `<option value="${v}" ${v===currentRef? 'selected':''}>${v}</option>`).join('');
        renderActiveChips();
      }

      function renderActiveChips(){
        activeChips.innerHTML = '';
        const chips = [];
        if(activeStatusFilter !== 'All') chips.push(['Status', activeStatusFilter]);
        if(filterDept.value) chips.push(['Department', filterDept.value]);
        if(filterResp.value) chips.push(['Person', filterResp.value]);
        if(filterRef.value) chips.push(['Reference', filterRef.value]);
        if(filterMonth.value) chips.push(['Month', filterMonth.options[filterMonth.selectedIndex].text || filterMonth.value]);
        if(filterYear.value) chips.push(['Year', filterYear.value]);
        if(filterText.value) chips.push(['Search', filterText.value]);

        chips.forEach(([k,v])=>{
          const el = document.createElement('div'); el.className='chip'; el.style.marginRight='8px';
          el.innerHTML = `${k}: ${v} <span style="opacity:.7;margin-left:8px;cursor:pointer;font-weight:600">✕</span>`;
          el.addEventListener('click', ()=>{ 
            if(k==='Status') { applyStatusFilter('All'); return; }
            if(k==='Department') filterDept.value=''; if(k==='Person') filterResp.value=''; if(k==='Reference') filterRef.value=''; if(k==='Month') filterMonth.value=''; if(k==='Year') filterYear.value=''; if(k==='Search'){ filterText.value=''; if(filterTextMobile) filterTextMobile.value=''; } populateFilters(); renderTable(); 
          });
          activeChips.appendChild(el);
        });
      }

      function applyStatusFilter(status) {
        activeStatusFilter = status;
        cardTotal.classList.remove('active-filter');
        cardOpen.classList.remove('active-filter');
        cardClosed.classList.remove('active-filter');
        
        if(status === 'All') cardTotal.classList.add('active-filter');
        if(status === 'Open') cardOpen.classList.add('active-filter');
        if(status === 'Closed') cardClosed.classList.add('active-filter');

        renderTable();
      }

      function renderTable(){
        let data = allData || [];

        // 1. Apply Status Filter from Dashboard Cards
        if (activeStatusFilter === 'Open') {
          data = data.filter(r => (r.Status || '').toString().trim().toLowerCase() === 'open');
        } else if (activeStatusFilter === 'Closed') {
          data = data.filter(r => (r.Status || '').toString().trim().toLowerCase() === 'closed');
        }

        // 2. Apply Dropdown Filters
        if(filterDept.value) data = data.filter(r => (r.Department || '') === filterDept.value);
        if(filterResp.value) data = data.filter(r => (r["Responsible Person"] || '') === filterResp.value);
        if(filterRef.value) data = data.filter(r => (r.Reference || '') === filterRef.value);
        if(filterYear.value && filterYear.value !== "") { 
          data = data.filter(r => dateHelper(r["Initiation Date"]).startsWith(filterYear.value));
        }
        if(filterMonth.value && filterMonth.value !== "") { 
          const targetMonth = filterMonth.value;
          const targetYear = filterYear.value;
          data = data.filter(r => {
              const date = dateHelper(r["Initiation Date"]);
              if (!date) return false;
              const month = date.substring(5,7);
              const year = date.substring(0,4);
              if (targetYear && targetYear !== "") { return year === targetYear && month === targetMonth; } else { return month === targetMonth; }
          });
        }
        if(filterText.value){ const s = filterText.value.toLowerCase(); data = data.filter(r => (r.Description || '').toLowerCase().includes(s) || (r.Reference || '').toLowerCase().includes(s)); }
        
        filteredData = data; 
        updateStats();

        const createRow = (r) => {
          const statusRaw = (r.Status || '').toString().trim();
          const statusLower = statusRaw.toLowerCase();
          let statusClass=''; 
          let badgeClass = 'status-other-badge';
          if(statusLower==='closed'){ statusClass=''; badgeClass='status-closed-badge'; }
          else if(statusLower==='open') { statusClass=''; badgeClass='status-open-badge'; }

          const statusDisplay = `<div class="status-badge ${badgeClass}">${statusRaw}</div>`;
          const desc = (r.Description || '').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
          const initiationDate = cleanDate(r["Initiation Date"]) || "";
          const targetDate = cleanDate(r["Target Date"]) || "";

          return `<tr class="${statusClass}" data-row="${r.Row || ''}" data-json='${encodeURIComponent(JSON.stringify(r))}'>
            <td class="cell-mono">${r.Row || ""}</td>
            <td>${(r.Department || "")}</td>
            <td class="description" data-desc="${desc}" data-slno="${r.Row || ''}" data-dept="${r.Department || ''}" tabindex="0" aria-label="Description"><div class="desc-text">${desc}</div></td>
            <td>${r.Reference || ""}</td>
            <td class="cell-mono">${initiationDate}</td>
            <td class="cell-mono">${targetDate}</td>
            <td>${r["Action By"] || ""}</td>
            <td>${r["Responsible Person"] || ""}</td>
            <td class="status-col">${statusDisplay}</td>
          </tr>`;
        };

        tableBody.innerHTML = filteredData.length ? filteredData.map(createRow).join('') : `<tr><td colspan="9" class="text-muted text-center">No matching records</td></tr>`;
        attachRowClickHandlers();

        const createCard = (r) => {
          const statusRaw = (r.Status || '').toString().trim();
          const statusLower = statusRaw.toLowerCase();
          let badgeClass = 'status-other-badge';
          let accentClass = 'accent-other';
          if(statusLower==='closed'){ badgeClass='status-closed-badge'; accentClass='accent-closed'; }
          else if(statusLower==='open') { badgeClass='status-open-badge'; accentClass='accent-open'; }
          const statusDisplay = `<div class="status-badge ${badgeClass}">${statusRaw}</div>`;
          const desc = (r.Description || '').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
          const initiationDate = cleanDate(r["Initiation Date"]) || "";
          const photoCount = String(r.Image || '').split(',').map(s => s.trim()).filter(Boolean).length;
          const photoBadge = photoCount > 0 ? `<span class="photo-count"><i class="bi bi-camera-fill"></i>${photoCount > 1 ? photoCount : ''}</span>` : '';

          return `<div class="item-card ${accentClass}" data-row="${r.Row || ''}" data-json='${encodeURIComponent(JSON.stringify(r))}'>
            <div class="item-card-top">
              <span class="item-dept">${(r.Department || "")}</span>
              ${statusDisplay}
            </div>
            <div class="item-desc">${desc}</div>
            <div class="item-card-meta">
              <span class="item-ref-tag">${r.Reference || "—"}</span>
              <span class="item-date"><i class="bi bi-calendar-event"></i>${initiationDate}</span>
              ${photoBadge}
            </div>
            <div class="item-card-foot">
              <span class="person"><i class="bi bi-person-fill"></i>${r["Responsible Person"] || "—"}</span>
              <i class="bi bi-chevron-right"></i>
            </div>
          </div>`;
        };

        if (cardListWrap) {
          cardListWrap.innerHTML = filteredData.length ? filteredData.map(createCard).join('') : `<div class="card-list-empty">No matching records</div>`;
          attachCardClickHandlers();
        }

        updateFilterCountBadge();
      }

      function attachCardClickHandlers(){
        document.querySelectorAll('#cardListWrap .item-card').forEach((el)=>{
          if(el._clickHandler) el.removeEventListener('click', el._clickHandler);
        });
        document.querySelectorAll('#cardListWrap .item-card').forEach((el)=>{
          el._clickHandler = function(){
            const json = el.getAttribute('data-json');
            if(!json) return;
            const obj = JSON.parse(decodeURIComponent(json));
            currentIndex = filteredData.findIndex(item => String(item.Row) === String(obj.Row));
            openFloatCardByIndex(currentIndex);
          };
          el.addEventListener('click', el._clickHandler);
        });
      }

      function updateFilterCountBadge(){
        if(!filterCountBadge) return;

      // Resize the chosen photo client-side (max 1280px wide) before converting to base64,
      // so uploads stay small and quick on mobile connections.
      function resizeImageFile(file){
        return new Promise((resolve, reject)=>{
          const img = new Image();
          const reader = new FileReader();
          reader.onload = (e) => { img.src = e.target.result; };
          reader.onerror = reject;
          img.onload = () => {
            const maxDim = 1280;
            let { width, height } = img;
            if (width > maxDim || height > maxDim){
              if (width > height){ height = Math.round(height * (maxDim/width)); width = maxDim; }
              else { width = Math.round(width * (maxDim/height)); height = maxDim; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.82));
          };
          img.onerror = reject;
          reader.readAsDataURL(file);
        });
      }
